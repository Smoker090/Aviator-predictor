<!DOCTYPE html>
<html>
<head>
  <title>MR CRUSHER PRO — VIP Bot</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
  <style>
    body { background:#0a001f; color:#fff; font-family:Arial; text-align:center; padding:40px; }
    h1 { color:#ff00cc; font-size:32px; }
    .section { margin-top:30px; border:2px solid #ff00cc; padding:20px; border-radius:10px; }
    button { background:#ff00cc; color:#fff; border:none; padding:12px 24px; font-size:18px; border-radius:8px; cursor:pointer; }
    .value { font-size:24px; color:#00ffcc; }
    .hidden { display:none; }
    input { padding:10px; font-size:18px; border-radius:6px; border:none; margin-top:10px; }
  </style>
</head>
<body>
  <h1>⚡ MR CRUSHER PRO ⚡<br>FAST + BIG Engines</h1>

  <!-- Password Gate -->
  <div id="gate" class="section">
    <p>🔒 ACCESS REQUIRED</p>
    <input type="password" id="passInput" placeholder="Enter VIP password" />
    <button onclick="unlock()">UNLOCK</button>
  </div>

  <!-- Engines -->
  <div id="engines" class="hidden">
    <div class="section">
      <h2>FAST SIGNAL ENGINE</h2>
      <p class="value" id="fastMultiplier">--</p>
      <p id="fastStatus">Signal live!</p>
      <button onclick="generateFast()">Generate Signal</button>
    </div>

    <div class="section">
      <h2>BIG HUNTER ENGINE</h2>
      <p class="value" id="bigMultiplier">--</p>
      <p id="bigStatus">Big incoming in <span id="bigCountdown">--</span>s</p>
      <button onclick="generateBig()">Catch Big</button>
    </div>
  </div>

  <script>
    // Fixed password (set it here)
    const FIXED_PASSWORD = "crusherVIP2026";

    function unlock() {
      const input = document.getElementById("passInput").value.trim();
      if (input === FIXED_PASSWORD) {
        document.getElementById("gate").classList.add("hidden");
        document.getElementById("engines").classList.remove("hidden");
      } else {
        alert("Wrong password. Try again.");
      }
    }

    function generateFast() {
      const seed = Date.now().toString();
      const hash = CryptoJS.SHA256(seed + "-fast").toString();
      const num = parseInt(hash.slice(0,8),16);
      const multiplier = (1.5 + (num % 1000)/1000).toFixed(2);
      document.getElementById("fastMultiplier").textContent = multiplier + "x";
      document.getElementById("fastStatus").textContent = "Signal live!";
    }

    function generateBig() {
      const seed = Date.now().toString();
      const hash = CryptoJS.SHA256(seed + "-big").toString();
      const num = parseInt(hash.slice(0,8),16);
      const multiplier = (5 + (num % 5000)/1000).toFixed(2);
      document.getElementById("bigMultiplier").textContent = multiplier + "x";
      let countdown = 105;
      const el = document.getElementById("bigCountdown");
      const timer = setInterval(() => {
        countdown--;
        el.textContent = countdown + "s";
        if (countdown <= 0) clearInterval(timer);
      },1000);
      document.getElementById("bigStatus").textContent = "Big incoming!";
    }
  </script>
</body>
</html>
